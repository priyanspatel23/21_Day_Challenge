<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Notes App</title>

    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <header>
        <h1>📝 Notes</h1>

        <div class="controls">
            <input id="search" placeholder="Search..." oninput="renderNotes()">
            <button onclick="toggleDark()">🌙</button>
        </div>
    </header>
    <div class="container">
        <input id="newNote" placeholder="Write something..." />
        <button onclick="addNote()">Add</button>

        <h3>📌 Pinned</h3>
        <div id="pinned" class="grid"></div>

        <h3>All Notes</h3>
        <div id="notes" class="grid"></div>
    </div>

    <script src="./script.js"></script>

</body>

</html>
